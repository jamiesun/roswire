name: Release

"on":
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: "Build ${{ matrix.asset_name }}"
    runs-on: "${{ matrix.os }}"
    strategy:
      fail-fast: false
      matrix:
        include:
          - asset_name: roswire-linux-amd64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: roswire-linux-amd64.tar.gz
            smoke: true
          - asset_name: roswire-linux-arm64
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive: roswire-linux-arm64.tar.gz
            smoke: false
          - asset_name: roswire-windows-amd64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: roswire-windows-amd64.zip
            smoke: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: "${{ matrix.target }}"

      - name: Install Linux arm64 linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build release binary
        run: "cargo build --release --locked --target ${{ matrix.target }}"

      - name: Smoke test release binary (Unix)
        if: ${{ runner.os != 'Windows' && matrix.smoke }}
        shell: bash
        run: |
          set -euo pipefail
          "target/${{ matrix.target }}/release/roswire" doctor --json > smoke.json

      - name: Smoke test release binary (Windows)
        if: ${{ runner.os == 'Windows' && matrix.smoke }}
        shell: pwsh
        run: |
          .\target\${{ matrix.target }}\release\roswire.exe doctor --json | Out-File -Encoding utf8 smoke.json

      - name: Skip smoke test for cross-compiled target
        if: ${{ ! matrix.smoke }}
        run: |
          echo "Skipping smoke test for ${{ matrix.target }} because the hosted runner cannot execute this architecture."

      - name: Package binary (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist package
          cp "target/${{ matrix.target }}/release/roswire" package/roswire
          chmod +x package/roswire
          tar -C package -czf "dist/${{ matrix.archive }}" roswire

      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist, package | Out-Null
          Copy-Item ".\target\${{ matrix.target }}\release\roswire.exe" ".\package\roswire.exe"
          Compress-Archive -Path ".\package\roswire.exe" -DestinationPath ".\dist\${{ matrix.archive }}" -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: "${{ matrix.asset_name }}"
          path: "dist/${{ matrix.archive }}"
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd dist
          sha256sum *.tar.gz *.zip > checksums.txt

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
